<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Realtime - GIABAO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h2>Tham gia hệ thống Chat</h2>
            <input type="text" id="username-input" placeholder="Nhập tên của bạn..." autocomplete="off">
            <button id="join-btn">Vào Chat</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="sidebar">
            <h3>Đang Online 🟢</h3>
            <ul id="user-list">
                </ul>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <h3 id="chat-with-title">Vui lòng chọn 1 người để chat</h3>
            </div>
            <div class="messages" id="messages-box">
                </div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." disabled>
                <button id="send-btn" disabled>Gửi</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
