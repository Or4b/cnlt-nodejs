<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm thử Streams</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .box { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        button, a.btn { padding: 10px 15px; background: #3498db; color: white; border: none; cursor: pointer; text-decoration: none; display: inline-block;}
        button:hover, a.btn:hover { background: #2980b9; }
        input { padding: 10px; width: 60%; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #8e44ad; text-align: center;">TỔNG HỢP 4 LOẠI STREAMS</h1>
        
        <div class="box">
            <h3>4.1 Readable Stream (Đọc File)</h3>
            <a href="/streams/read" target="_blank" class="btn">Đọc file story.txt</a>
        </div>

        <div class="box">
            <h3>4.2 Writable Stream (Ghi File)</h3>
            <form action="/streams/write" method="POST" target="_blank">
                <input type="text" name="noidung" placeholder="Nhập nội dung muốn ghi vào log.txt..." required>
                <button type="submit">Ghi vào File Log</button>
            </form>
        </div>

        <div class="box">
            <h3>4.3 Transform Stream (Biến đổi dữ liệu)</h3>
            <a href="/streams/transform" target="_blank" class="btn">Đọc story.txt và BIẾN THÀNH CHỮ IN HOA</a>
        </div>

        <div class="box">
            <h3>4.4 Duplex Stream (Echo: Nhận và Trả)</h3>
            <form action="/streams/duplex" method="POST" target="_blank">
                <input type="text" name="echotext" placeholder="Gõ gì cũng được..." required>
                <button type="submit">Test Echo Duplex</button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 20px;"><a href="/" class="btn" style="background:#95a5a6;">Về trang chủ</a></div>
    </div>
</body>
</html>
